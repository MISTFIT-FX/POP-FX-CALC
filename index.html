<style>
body{
  font-family:Segoe UI,sans-serif;
  background:linear-gradient(135deg,#070b13,#101827,#0d1525);

  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding-top: 5px;
  color:white;
}

.container{width:100%;max-width:900px;}

.card{
  width:100%;
  max-width:850px;
  max-height:95vh;
  overflow:auto;

  background:rgba(255,255,255,.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:25px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,.5);
  margin-top:5px;
}

@media (max-width: 600px){

.card{
  padding:15px;
  border-radius:18px;
}

.header h1{
  font-size:1.4rem;
}

input, select{
  padding:12px;
  font-size:0.95rem;
}

.result-value{
  font-size:1.2rem;
}

}

.header{text-align:center;margin-bottom:25px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:18px;
}

.field{display:flex;flex-direction:column;}

label{margin-bottom:8px;font-weight:600;}

input,select{
padding:14px;
border-radius:14px;
background:#24324b;
border:1px solid rgba(111,143,255,.35);
color:white;
font-size:1rem;
}

.results{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.result{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
text-align:center;
}

.result-title{opacity:.7;margin-bottom:10px;}
.result-value{font-size:1.5rem;font-weight:bold;}

.safety{
margin-top:20px;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:bold;
}

.good{background:rgba(0,255,100,.15);border:1px solid rgba(0,255,100,.3);}
.medium{background:rgba(255,180,0,.15);border:1px solid rgba(255,180,0,.3);}
.danger{background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.3);}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:14px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#4f7cff,#7a5cff);
color:white;
}

.footer{
margin-top:20px;
text-align:center;
opacity:.6;
font-size:.85rem;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
<h1>📊Trading Calculator💹</h1>
<p>Funded Trader Risk Manager</p>
</div>

<div class="grid">

<div class="field">
<label>Account Size ($)</label>
<input type="number" id="balance" placeholder="e.g. 100000">
</div>

<div class="field">
<label>Risk Per Trade (%)</label>
<input type="number" id="risk" placeholder="e.g. 5">
</div>

<div class="field">
<label>Stop Loss (Pips)</label>
<input type="number" id="sl" placeholder="e.g. 10">
</div>

<div class="field">
<label>Instrument</label>
<select id="instrument">
<option value="forex">Forex Majors</option>
<option value="gold">Gold (XAUUSD)</option>
</select>
</div>

</div>

<div class="results">

<div class="result">
<div class="result-title">Risk Amount</div>
<div class="result-value" id="riskAmount">$0</div>
</div>

<div class="result">
<div class="result-title">Lot Size</div>
<div class="result-value" id="lot">0.00</div>
</div>

<div class="result">
<div class="result-title">Losses Before 10% DD</div>
<div class="result-value" id="drawdown">0</div>
</div>

</div>

<div id="safety" class="safety">
Waiting for input...
</div>

<button onclick="resetCalculator()">Reset</button>

<div class="footer">
Nothing beats Discipline and Consistency.
</div>

</div>
</div>

<script>
const fields = document.querySelectorAll("input, select");
fields.forEach(f => f.addEventListener("input", calculate));

function calculate(){

let balance = parseFloat(document.getElementById("balance").value);
let risk = parseFloat(document.getElementById("risk").value);
let sl = parseFloat(document.getElementById("sl").value);
let instrument = document.getElementById("instrument").value;

if(!balance || !risk || !sl) return;

let riskAmount = balance * (risk / 100);

let lot = 0;

if(instrument === "forex"){
lot = riskAmount / (sl * 10);
}
else{
lot = riskAmount / (sl * 100);
}

let losses = Math.floor(10 / risk);

document.getElementById("riskAmount").innerText = "$" + riskAmount.toFixed(2);
document.getElementById("lot").innerText = lot.toFixed(2);
document.getElementById("drawdown").innerText = losses;

let safety = document.getElementById("safety");

if(risk <= 0.5){
safety.className = "safety good";
safety.innerHTML = "✓ Excellent for Prop Firms";
}
else if(risk <= 1){
safety.className = "safety medium";
safety.innerHTML = "⚠ Moderate Risk";
}
else{
safety.className = "safety danger";
safety.innerHTML = "☠ Dangerous for Most Prop Firms";
}

}

function resetCalculator(){
document.querySelectorAll("input").forEach(i => i.value = "");
document.getElementById("riskAmount").innerText = "$0";
document.getElementById("lot").innerText = "0.00";
document.getElementById("drawdown").innerText = "0";
document.getElementById("safety").innerHTML = "Waiting for input...";
document.getElementById("safety").className = "safety";
}
</script>

</body>
</html>
